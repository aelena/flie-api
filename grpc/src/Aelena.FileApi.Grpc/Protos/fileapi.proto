syntax = "proto3";

option csharp_namespace = "Aelena.FileApi.Grpc.Proto";

package fileapi;

// ─── Service Definitions ─────────────────────────────────────────────────────

service FileService {
  // Compute-bound (small payload, high frequency)
  rpc Hash (FileRequest) returns (HashResponse);
  rpc PdfMetrics (FileRequest) returns (PdfMetricsResponse);
  rpc DocxMetrics (FileRequest) returns (DocxMetricsResponse);
  rpc TxtMetrics (FileRequest) returns (TxtMetricsResponse);

  // Binary operations (large payloads)
  rpc PdfRotate (PdfRotateRequest) returns (FileResponse);
  rpc ImageResize (ImageResizeRequest) returns (FileResponse);
  rpc ImageConvert (ImageConvertRequest) returns (FileResponse);
  rpc ImageCompress (ImageCompressRequest) returns (FileResponse);

  // Streaming operations
  rpc PdfMerge (stream FileChunk) returns (FileResponse);
  rpc PdfSplit (PdfSplitRequest) returns (stream FileChunk);
}

// ─── Common Messages ─────────────────────────────────────────────────────────

message FileRequest {
  string file_name = 1;
  bytes data = 2;
}

message FileResponse {
  string file_name = 1;
  bytes data = 2;
  string content_type = 3;
}

message FileChunk {
  string file_name = 1;
  bytes data = 2;
  bool is_last = 3;
}

// ─── Hash ────────────────────────────────────────────────────────────────────

message HashResponse {
  string file_name = 1;
  int64 file_size_bytes = 2;
  string sha256 = 3;
  string md5 = 4;
  string sha1 = 5;
  string composite_sha256 = 6;
}

// ─── PDF Metrics ─────────────────────────────────────────────────────────────

message PdfMetricsResponse {
  string file_name = 1;
  int64 file_size_bytes = 2;
  int32 page_count = 3;
  int32 word_count = 4;
  int32 char_count = 5;
  int32 token_count = 6;
  string language = 7;
  int32 image_count = 8;
  int32 table_count = 9;
  bool is_corrupt = 10;
  bool is_signed = 11;
  bool ocr_needed = 12;
  repeated int32 ocr_pages = 13;
  double avg_chars_per_page = 14;
}

// ─── DOCX Metrics ────────────────────────────────────────────────────────────

message DocxMetricsResponse {
  string file_name = 1;
  int64 file_size_bytes = 2;
  int32 paragraph_count = 3;
  int32 word_count = 4;
  int32 char_count = 5;
  int32 token_count = 6;
  string language = 7;
  int32 image_count = 8;
  int32 table_count = 9;
  optional int32 page_count = 10;
}

// ─── TXT Metrics ─────────────────────────────────────────────────────────────

message TxtMetricsResponse {
  string file_name = 1;
  int64 file_size_bytes = 2;
  int32 line_count = 3;
  int32 word_count = 4;
  int32 char_count = 5;
  int32 token_count = 6;
  string language = 7;
}

// ─── PDF Operations ──────────────────────────────────────────────────────────

message PdfRotateRequest {
  string file_name = 1;
  bytes data = 2;
  int32 angle = 3;          // 90, 180, or 270
  optional string pages = 4; // e.g. "1,3,5-8"
}

message PdfSplitRequest {
  string file_name = 1;
  bytes data = 2;
  string ranges = 3;         // semicolon-separated: "1-3;4-6;7"
}

// ─── Image Operations ────────────────────────────────────────────────────────

message ImageResizeRequest {
  string file_name = 1;
  bytes data = 2;
  optional int32 width = 3;
  optional int32 height = 4;
  bool maintain_aspect = 5;
}

message ImageConvertRequest {
  string file_name = 1;
  bytes data = 2;
  string target_format = 3;  // png, jpeg, webp, bmp, gif, tiff
}

message ImageCompressRequest {
  string file_name = 1;
  bytes data = 2;
  int32 quality = 3;         // JPEG quality 1-100
}
